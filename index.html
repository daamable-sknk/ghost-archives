<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — ghost-archive</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      text-align: center;
    }
    .card .number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .chart-section {
      margin-bottom: 2.5rem;
    }
    .chart-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .chart-container {
      position: relative;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
    }
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      font-size: 0.85rem;
    }
    .pipeline-step {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem 1rem;
      text-align: center;
    }
    .pipeline-step .step-number {
      font-size: 1.25rem;
      font-weight: 700;
    }
    .pipeline-step .step-label {
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .pipeline-arrow {
      color: var(--text-muted);
      font-size: 1.2rem;
    }
    .dashboard-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.8;
    }
    .dashboard-meta strong {
      color: var(--text);
      font-weight: 600;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .chart-header h2 {
      margin-bottom: 0;
    }
    .chart-toggle {
      display: flex;
      gap: 0.25rem;
    }
    .chart-toggle button {
      background: #fff;
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 3px;
      color: var(--text-muted);
    }
    .chart-toggle button.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <h1>ghost-archive</h1>
    <p class="description">'아카이브'라는 단어의 용례 수집</p>
    <nav>
      <a href="index.html" class="active">대시보드</a>
      <a href="list.html">목록</a>
      <a href="about.html">소개</a>
      <a href="methodology.html">방법론</a>
    </nav>
  </header>

  <main>
    <section class="dashboard-meta">
      <div>
        수집 기간 <strong id="collection-period">-</strong>
        <span class="collection-days" id="collection-days"></span>
      </div>
      <div>
        마지막 업데이트 <strong id="last-updated">-</strong>
      </div>
    </section>

    <!-- 파이프라인 상태 -->
    <section>
      <h2 style="font-size:1rem;font-weight:600;margin-bottom:1rem;">파이프라인</h2>
      <div class="pipeline">
        <div class="pipeline-step">
          <div class="step-number" id="pipe-total">-</div>
          <div class="step-label">수집</div>
        </div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-step">
          <div class="step-number" id="pipe-classified">-</div>
          <div class="step-label">분류 완료</div>
        </div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-step">
          <div class="step-number" id="pipe-unclassified">-</div>
          <div class="step-label">미분류</div>
        </div>
      </div>
    </section>

    <!-- 요약 카드 -->
    <div class="dashboard-cards">
      <div class="card">
        <div class="number" id="card-total">-</div>
        <div class="label">전체</div>
      </div>
      <div class="card">
        <div class="number" id="card-ko">-</div>
        <div class="label">한국어</div>
      </div>
      <div class="card">
        <div class="number" id="card-en">-</div>
        <div class="label">English</div>
      </div>
      <div class="card">
        <div class="number" id="card-sources">-</div>
        <div class="label">소스 유형</div>
      </div>
      <div class="card">
        <div class="number" id="card-events">-</div>
        <div class="label">고유 이벤트</div>
      </div>
    </div>

    <!-- 카테고리 분포 -->
    <section class="chart-section">
      <div class="chart-header">
        <h2>카테고리 분포</h2>
        <div class="chart-toggle" id="category-mode-toggle">
          <button type="button" data-mode="articles" class="active">기사</button>
          <button type="button" data-mode="events">이벤트</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="category-chart"></canvas>
      </div>
    </section>

    <!-- 월별 카테고리 -->
    <section class="chart-section">
      <h2>월별 카테고리</h2>
      <div class="chart-container">
        <canvas id="monthly-chart"></canvas>
      </div>
    </section>

    <!-- 시간 추이 -->
    <section class="chart-section">
      <h2>수집 추이 (주간)</h2>
      <div class="chart-container">
        <canvas id="timeline-chart"></canvas>
      </div>
    </section>
  </main>

  <footer>
    <p>
      <a href="https://github.com/daamable-sknk/ghost-archives">GitHub</a>
      <span class="separator">·</span>
      <a href="https://are.na/daehwan-jang/ghost-archive">Are.na</a>
    </p>
  </footer>

  <script>
    const CATEGORY_ORDER = ['제도', '예술', '마케팅', '큐레이션', '시민', '감성', '기술'];
    const CATEGORY_COLORS = {
      '마케팅': '#e63946',
      '감성': '#9b5de5',
      '큐레이션': '#fee440',
      '시민': '#06d6a0',
      '제도': '#8d99ae',
      '기술': '#212529',
      '예술': '#118ab2'
    };

    function formatDateTime(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('ko-KR', {
        timeZone: 'Asia/Seoul',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    function getCollectionRange(items) {
      let min = null;
      let max = null;
      for (const item of items) {
        const day = (item.collected_at || item.published_at || '').split('T')[0];
        if (!day) continue;
        if (!min || day < min) min = day;
        if (!max || day > max) max = day;
      }
      if (!min || !max) return { label: '-', days: null };
      const label = min === max ? min : `${min} ~ ${max}`;
      const days = Math.round((new Date(max) - new Date(min)) / 86400000) + 1;
      return { label, days };
    }

    function countUniqueEvents(items) {
      const seen = new Set();
      items.forEach(i => seen.add(i.event_id || i.id));
      return seen.size;
    }

    function countByCategory(items, mode) {
      const counts = {};
      if (mode === 'articles') {
        items.forEach(i => {
          const cat = i.category || '미분류';
          counts[cat] = (counts[cat] || 0) + 1;
        });
      } else {
        const seen = new Set();
        items.forEach(i => {
          const key = i.event_id || i.id;
          if (seen.has(key)) return;
          seen.add(key);
          const cat = i.category || '미분류';
          counts[cat] = (counts[cat] || 0) + 1;
        });
      }
      return counts;
    }

    function buildMonthlyData(items) {
      const monthMap = {};
      items.forEach(i => {
        const month = (i.collected_at || i.published_at || '').slice(0, 7);
        const cat = i.category;
        if (!month || !cat) return;
        if (!monthMap[month]) monthMap[month] = {};
        monthMap[month][cat] = (monthMap[month][cat] || 0) + 1;
      });
      const months = Object.keys(monthMap).sort();
      return { months, monthMap };
    }

    async function init() {
      const res = await fetch('data/ghosts.json');
      const data = await res.json();
      const items = data.items;

      const range = getCollectionRange(items);
      document.getElementById('collection-period').textContent = range.label;
      if (range.days && range.days > 1) {
        document.getElementById('collection-days').textContent = ` (${range.days}일)`;
      }
      document.getElementById('last-updated').textContent = formatDateTime(data.meta?.last_updated);

      // 파이프라인
      const total = items.length;
      const classified = items.filter(i => i.category).length;
      const unclassified = total - classified;

      document.getElementById('pipe-total').textContent = total;
      document.getElementById('pipe-classified').textContent = classified;
      document.getElementById('pipe-unclassified').textContent = unclassified;

      // 카드
      document.getElementById('card-total').textContent = total;
      document.getElementById('card-ko').textContent = items.filter(i => i.language === 'ko').length;
      document.getElementById('card-en').textContent = items.filter(i => i.language === 'en').length;
      document.getElementById('card-sources').textContent = [...new Set(items.map(i => i.source_type))].length;
      document.getElementById('card-events').textContent = countUniqueEvents(items);

      let categoryChart = null;
      let categoryMode = 'articles';

      function renderCategoryChart(mode) {
        categoryMode = mode;
        const catCounts = countByCategory(items, mode);
        const catLabels = Object.keys(catCounts).sort((a, b) => catCounts[b] - catCounts[a]);
        const catData = catLabels.map(l => catCounts[l]);
        const catColors = catLabels.map(l => CATEGORY_COLORS[l] || '#ccc');

        if (categoryChart) categoryChart.destroy();
        categoryChart = new Chart(document.getElementById('category-chart'), {
          type: 'bar',
          data: {
            labels: catLabels,
            datasets: [{ data: catData, backgroundColor: catColors, borderWidth: 0 }]
          },
          options: {
            indexAxis: 'y',
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false } },
              y: { grid: { display: false } }
            }
          }
        });
      }

      document.querySelectorAll('#category-mode-toggle button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#category-mode-toggle button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderCategoryChart(btn.dataset.mode);
        });
      });

      renderCategoryChart('articles');

      const { months, monthMap } = buildMonthlyData(items);
      new Chart(document.getElementById('monthly-chart'), {
        type: 'bar',
        data: {
          labels: months,
          datasets: CATEGORY_ORDER.map(cat => ({
            label: cat,
            data: months.map(m => monthMap[m]?.[cat] || 0),
            backgroundColor: CATEGORY_COLORS[cat],
            borderWidth: 0
          }))
        },
        options: {
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } },
          scales: {
            x: { stacked: true, grid: { display: false } },
            y: { stacked: true, beginAtZero: true, grid: { color: '#eee' } }
          }
        }
      });

      // 시간 추이 (주간 집계)
      const weekMap = {};
      items.forEach(i => {
        const d = new Date(i.collected_at || i.published_at);
        if (isNaN(d)) return;
        // ISO week start (Monday)
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        const weekStart = new Date(d.setDate(diff));
        const key = weekStart.toISOString().split('T')[0];
        weekMap[key] = (weekMap[key] || 0) + 1;
      });

      const weeks = Object.keys(weekMap).sort();
      new Chart(document.getElementById('timeline-chart'), {
        type: 'line',
        data: {
          labels: weeks,
          datasets: [{
            data: weeks.map(w => weekMap[w]),
            borderColor: '#333',
            backgroundColor: 'rgba(0,0,0,0.05)',
            fill: true,
            tension: 0.3,
            pointRadius: 2
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 8, font: { size: 10 } } },
            y: { beginAtZero: true, grid: { color: '#eee' } }
          }
        }
      });
    }

    init();
  </script>
</body>
</html>
